<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Forgot Password – Sankalp</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body data-page="forgot">
  <nav class="navbar">
    <a href="/" class="logo">Sankalp</a>
    <div class="nav-links">
      <a href="/login.html">Login</a>
    </div>
  </nav>

  <div style="min-height: 90vh; display: flex; align-items: center; justify-content: center;">
    <div class="glass p-6 w-full max-w-md">
      <h2 class="text-2xl font-bold mb-4 text-center">Reset Password</h2>
      <form id="forgotForm">
        <input type="email" id="forgotEmail" placeholder="Registered email" class="mb-2" required />
        <div class="flex gap-2 mb-2">
          <input type="text" id="forgotOtp" placeholder="OTP" class="flex-1" required />
          <button type="button" id="forgotSendOtp" class="btn-outline">Send OTP</button>
        </div>
        <input type="password" id="newPassword" placeholder="New Password" class="mb-4" required />
        <button type="submit" class="btn-primary w-full">Update Password</button>
      </form>
      <p class="text-center mt-4 text-sm">
        <a href="/login.html">Back to Login</a>
      </p>
    </div>
  </div>

  <script src="/assets/js/app.js"></script>
</body>
</html>
