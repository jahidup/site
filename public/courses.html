<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>All Courses – Sankalp</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body data-page="courses">
  <nav class="navbar">
    <a href="/" class="logo">Sankalp</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/courses.html" class="active">Courses</a>
      <a href="/login.html">Login</a>
    </div>
  </nav>

  <section style="padding: 120px 4% 60px;">
    <div class="max-w-6xl mx-auto">
      <h1 class="text-3xl font-bold mb-6">All Courses</h1>

      <!-- Search & Filter -->
      <div class="flex flex-col md:flex-row gap-4 mb-8">
        <input id="courseSearch" type="text" placeholder="Search courses..." class="flex-1" />
        <div class="flex gap-2 flex-wrap">
          <button class="filter-btn btn-outline active" data-category="all">All</button>
          <button class="filter-btn btn-outline" data-category="jee">JEE</button>
          <button class="filter-btn btn-outline" data-category="neet">NEET</button>
          <button class="filter-btn btn-outline" data-category="foundation">Foundation</button>
        </div>
      </div>

      <div id="allCourses" class="course-grid">
        <!-- Dynamically loaded -->
      </div>
    </div>
  </section>

  <script src="/assets/js/app.js"></script>
</body>
</html>
